<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>{{ title or "ManagementAI" }}</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            background: #f5f6f8;
        }
        header {
            background: #1f2937;
            color: white;
            padding: 16px 24px;
        }
        nav a {
            color: white;
            margin-right: 16px;
            text-decoration: none;
        }
        main {
            padding: 24px;
        }
        .card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <header>
        <h1>ManagementAI</h1>
        <nav>
            <a href="/">ダッシュボード</a>
            <a href="/news">ニュース一覧</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
